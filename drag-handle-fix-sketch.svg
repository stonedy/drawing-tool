<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .bg{fill:#ded5c6}
      .panel{fill:#eadbc8;stroke:#171611;stroke-opacity:.12}
      .blue{fill:#8fb9ff}.yellow{fill:#f2d66d}.cream{fill:#fff8ea}.soft{fill:#fff8ea;fill-opacity:.62}
      .ink{fill:#171611}.muted{fill:#171611;fill-opacity:.58}
      .line{stroke:#171611;stroke-opacity:.18}.accent{stroke:#2563eb}
      .t{font:800 24px Inter,Arial,sans-serif}.s{font:500 15px Inter,Arial,sans-serif}.n{font:900 17px Inter,Arial,sans-serif}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text class="t ink" x="48" y="56">Drag Handle Fix Sketch</text>
  <text class="s muted" x="48" y="84">Only the order handle starts sorting. Sliders remain pure parameter controls.</text>

  <g transform="translate(48 130)">
    <rect class="panel" rx="28" width="520" height="520"/>
    <text class="t ink" x="30" y="46">Current weakness</text>
    <text class="s muted" x="30" y="76">01 looks clickable, but not obviously draggable. Sorting target is fragile.</text>
    <g transform="translate(30 120)">
      <rect class="soft" rx="18" width="460" height="108"/>
      <rect class="cream" rx="999" x="18" y="20" width="42" height="34"/>
      <text class="n ink" x="28" y="43">01</text>
      <rect class="blue" rx="999" x="78" y="28" width="86" height="8"/>
      <text class="s ink" x="78" y="68">Stroke 4</text>
      <line class="line" x1="78" y1="88" x2="430" y2="88"/>
    </g>
    <g transform="translate(30 260)">
      <rect class="soft" rx="18" width="460" height="142"/>
      <text class="s muted" x="18" y="34">Dragging Delay or Draw time should never move this card.</text>
      <rect class="cream" rx="999" x="18" y="64" width="410" height="10"/>
      <rect class="blue" rx="999" x="18" y="64" width="180" height="10"/>
      <circle class="blue" cx="198" cy="69" r="15"/>
      <text class="s muted" x="18" y="112">The range thumb needs its own gesture lane.</text>
    </g>
  </g>

  <g transform="translate(632 130)">
    <rect class="panel" rx="28" width="520" height="520"/>
    <text class="t ink" x="30" y="46">Proposed handle</text>
    <text class="s muted" x="30" y="76">Bigger target: order number + grip dots. Only this area sorts.</text>
    <g transform="translate(30 120)">
      <rect class="soft" rx="18" width="460" height="108"/>
      <rect class="yellow" rx="16" x="18" y="16" width="64" height="76"/>
      <text class="n ink" x="30" y="43">01</text>
      <circle class="ink" cx="34" cy="62" r="2.2"/><circle class="ink" cx="46" cy="62" r="2.2"/><circle class="ink" cx="58" cy="62" r="2.2"/>
      <circle class="ink" cx="34" cy="74" r="2.2"/><circle class="ink" cx="46" cy="74" r="2.2"/><circle class="ink" cx="58" cy="74" r="2.2"/>
      <rect class="blue" rx="999" x="100" y="28" width="86" height="8"/>
      <text class="s ink" x="100" y="68">Stroke 4</text>
      <line class="line" x1="100" y1="88" x2="430" y2="88"/>
    </g>
    <g transform="translate(30 260)">
      <rect class="soft" rx="18" width="460" height="142"/>
      <text class="s muted" x="18" y="34">When dragging the handle, compute drop position from pointer Y.</text>
      <line class="accent" x1="18" y1="72" x2="430" y2="72" stroke-width="3" stroke-dasharray="8 8"/>
      <text class="s ink" x="18" y="112">Stable over gaps, sliders, buttons, and scrolling content.</text>
    </g>
  </g>
</svg>
